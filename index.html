<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script>
        if (sessionStorage.getItem('introPlayed')) {
            document.documentElement.classList.add('skip-intro');
        } else {
            sessionStorage.setItem('introPlayed', 'true');
        }
    </script>

    <style>
        /* 기본 여백 제거 및 글꼴 설정 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        .split-container {
            position: relative;  
            height: 100vh;       
            width: 100vw;
            overflow: hidden;    
        }

        /* --- 왼쪽 무한 롤링 갤러리 영역 --- */
        .left-pane {
            position: absolute;  
            left: 0;
            top: 0;
            width: 50vw;         
            height: 100vh;
            background-color: #111;
            z-index: 1;          
            overflow: hidden;
        }

        /* 슬라이드 트랙: 애니메이션이 적용될 긴 레일 */
        .slide-track {
            display: flex;
            flex-direction: column;
            /* 🌟 속도를 45초로 단축하여 훨씬 빠르고 시원하게 롤링되도록 설정! */
            animation: scrollVertical 45s linear infinite;
        }

        .left-pane:hover .slide-track {
            animation-play-state: paused;
        }

        .slide-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 5px;
        }

        .slide-item {
            width: 100%;
            position: relative;
            aspect-ratio: 4/5;
            overflow: hidden;
            border-radius: 4px;
        }

        .slide-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        @keyframes scrollVertical {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }

        /* --- 오른쪽 영역 (텍스트 및 배경 애니메이션) --- */
        .right-pane {
            position: absolute;
            right: 0;            
            top: 0;
            width: 100vw;        
            height: 100vh;
            background-color: #ffffff;
            z-index: 2;          
            overflow: hidden;    
            
            animation: slideRightPane 1.5s ease-in-out 5.5s forwards;
        }

        .black-bg-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #000000;
            z-index: 0;
            animation: drainBlackBg 1.5s cubic-bezier(0.4, 0, 0.2, 1) 8.5s forwards;
        }

        .water-wave {
            position: absolute;
            top: 100vh;          
            left: -50vw;         
            width: 200vw;        
            height: 200vw;
            background-color: #ffffff;
            border-radius: 40%;  
            z-index: 1;          
            
            animation:
                waveRise 4s ease-in-out 1.5s forwards,
                waveSpin 6s linear 1.5s infinite;
        }

        .content-container {
            position: relative;
            z-index: 10;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;    
            text-align: center;
            padding: 40px;
            
            mix-blend-mode: difference;
            color: #ffffff;
        }

        @keyframes drainBlackBg { to { transform: translateY(100vh); } }
        @keyframes waveRise { 0% { top: 100vh; } 100% { top: -130vw; } }
        @keyframes waveSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes slideRightPane { to { width: 50vw; } }

        .title-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 300px;
        }

        .text-hello, .text-hyun, .main-title {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            white-space: nowrap;
        }

        .text-hello { font-size: 4rem; font-weight: 800; opacity: 0; animation: helloMorph 5.5s ease-in-out forwards; }
        .text-hyun { font-size: 4rem; font-weight: 800; opacity: 0; animation: hyunMorph 5.5s ease-in-out forwards; }
        .main-title { font-size: 4rem; line-height: 0.9; font-weight: 800; letter-spacing: -2px; opacity: 0; animation: weBuildMorph 1.5s ease-in-out 5.5s forwards; }
        .fade-in-item { opacity: 0; animation: fadeInItem 1.5s ease-in-out 6s forwards; }

        @keyframes helloMorph {
            0%   { opacity: 0; filter: blur(15px); letter-spacing: 10px; }
            10%  { opacity: 1; filter: blur(0px); letter-spacing: -2px; }  
            35%  { opacity: 1; filter: blur(0px); letter-spacing: -2px; }  
            45%  { opacity: 0; filter: blur(20px); letter-spacing: -20px; }
            100% { opacity: 0; filter: blur(20px); letter-spacing: -20px; visibility: hidden; }
        }

        @keyframes hyunMorph {
            0%   { opacity: 0; filter: blur(20px); letter-spacing: -20px; }
            40%  { opacity: 0; filter: blur(20px); letter-spacing: -20px; }
            45%  { opacity: 1; filter: blur(20px); letter-spacing: -20px; }
            55%  { opacity: 1; filter: blur(0px); letter-spacing: -2px; }  
            90%  { opacity: 1; filter: blur(0px); letter-spacing: -2px; }  
            100% { opacity: 0; filter: blur(20px); letter-spacing: -20px; visibility: hidden; }
        }

        @keyframes weBuildMorph {
            0%   { opacity: 0; filter: blur(20px); letter-spacing: -20px; }
            100% { opacity: 1; filter: blur(0px); letter-spacing: -2px; }
        }

        @keyframes fadeInItem {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .small-title {
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 1px;
            margin-top: 80px;    
            margin-bottom: 20px;
        }

        .description {
            font-family: 'Georgia', serif;
            font-size: 1.2rem;
            max-width: 400px;
            line-height: 1.5;
            margin-top: 30px;
            margin-bottom: 50px;
            white-space: normal;
        }

        /* 🌟 버튼 그룹: 사이 간격을 4px로 설정 */
        .button-group { 
            display: flex; 
            gap: 4px; 
        }

        .action-btn {
            padding: 15px 30px;
            background-color: transparent;
            border: 1px solid #ffffff; /* 모든 테두리 활성화 */
            color: #ffffff;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-btn:hover { background-color: #ffffff; color: #000000; }

        /* --- 1. 인트로 스킵 시 적용되는 CSS --- */
        html.skip-intro .right-pane { animation: none !important; width: 50vw !important; }
        html.skip-intro .black-bg-layer,
        html.skip-intro .water-wave,
        html.skip-intro .text-hello,
        html.skip-intro .text-hyun { display: none !important; animation: none !important; }
        html.skip-intro .main-title { animation: none !important; opacity: 1 !important; filter: blur(0px) !important; letter-spacing: -2px !important; }
        html.skip-intro .fade-in-item { animation: none !important; opacity: 1 !important; transform: translateY(0) !important; }

        /* --- 2. 모바일 반응형 --- */
        @media (max-width: 768px) {
            body, html { overflow-x: hidden; }
            .split-container { overflow: visible; }
            .left-pane { width: 100vw; height: 50vh; }
            .right-pane {
                width: 100vw;
                height: auto;
                min-height: 100vh;
                animation: slideDownPane 1.5s ease-in-out 5.5s forwards;
            }
            @keyframes slideDownPane {
                to { top: 50vh; min-height: 50vh; }
            }
            html.skip-intro .right-pane {
                width: 100vw !important;
                height: auto !important;
                min-height: 50vh !important;
                top: 50vh !important;
            }
            .content-container {
                height: auto;
                min-height: 50vh;
                padding: 50px 20px 70px 20px;
            }
            .pc-only { display: none; }
            .main-title {
                font-size: 2rem;
                line-height: 1.2;
                letter-spacing: -1px;
            }
            .text-hello, .text-hyun {

            }
            .title-container {
                height: 95px;
                margin: 5px 0;
            }
            .small-title {

            .description {
                font-size: 0.95rem;
                margin-top: 5px;
                margin-bottom: 30px;
                line-height: 1.4;
                padding: 0 10px;
            }
        }
    </style>
</head>
